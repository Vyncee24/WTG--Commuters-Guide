<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Route Result — WTG</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="visuals/WTGLOGO.png" alt="" width="150"><span class="badge">Beta</span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">← Back</a>
      <a href="profile.html">My Routes</a>
      <a href="login.html" id="nav-auth">Login</a>
    </div>
  </div>
</nav>

<div class="container-md page-wrap">

  <!-- Search-again bar -->
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <div class="search-input-wrap flex-1" style="min-width:160px;">
      <span class="icon"></span>
      <input class="form-control" id="from-input" type="text" placeholder="From" list="location-list"/>
    </div>
    <div class="search-input-wrap flex-1" style="min-width:160px;">
      <span class="icon"></span>
      <input class="form-control" id="to-input" type="text" placeholder="Destination" list="location-list"/>
    </div>
    <datalist id="location-list"></datalist>
    <button class="btn btn-primary" onclick="searchAgain()">Search</button>
  </div>

  <!-- Result area -->
  <div id="result-area"></div>

  <!-- Comments -->
  <div id="comments-wrap"></div>

</div>

<div id="toast-container"></div>

<script src="auth.js"></script>
<script src="user.js"></script>
<script src="routes.js"></script>
<script>
  const session = AUTH.getSession();
  if (session) {
    const authLink = document.getElementById('nav-auth');
    authLink.textContent = session.name.split(' ')[0];
    authLink.href = session.role === 'admin' ? 'admin.html' : 'profile.html';
    const logoutBtn = document.createElement('a');
    logoutBtn.href = '#';
    logoutBtn.textContent = 'Logout';
    logoutBtn.onclick = e => { e.preventDefault(); AUTH.logout(); };
    document.getElementById('nav-links').appendChild(logoutBtn);
  }

  /* ------------------------------------------------------- AUTOCOMPLETE --------------------------------------------------------------------------------------- */
  (async () => {
    try {
      const locs = await ROUTES.getAllLocations();
      const dl = document.getElementById('location-list');
      locs.forEach(l => {
        const o = document.createElement('option');
        o.value = l;
        dl.appendChild(o);
      });
    } catch (e) {
      console.warn('Autocomplete load error:', e);
    }
  })();

  let currentRoute = null;

  /* ------------------------------------------------------- LOAD RESULT --------------------------------------------------------------------------------------- */
  async function loadResult() {
    const raw = sessionStorage.getItem('wtg_search');
    if (!raw) { window.location.href = 'index.html'; return; }

    const { from, to } = JSON.parse(raw);
    document.getElementById('from-input').value = from;
    document.getElementById('to-input').value   = to;

    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<div class="loading"><div class="spinner"></div> Finding best route...</div>`;

    let results = [];
    try {
      results = await ROUTES.findRoute(from, to);
    } catch (e) {
      console.error('findRoute error:', e);
    }

    if (results.length === 0) {
      resultArea.innerHTML = `
        <div class="empty-state">
          <img src="visuals/maps.png" alt="Map Icon" style="width: 64px; height: auto;">
          <h3>No route found</h3>
          <p>We don't have a guide for "<strong>${from}</strong> → <strong>${to}</strong>" yet.<br/>
          Try a different spelling or check our popular routes.</p>
          <a href="index.html" class="btn btn-primary mt-16">Back to Finder</a>
        </div>`;
      return;
    }

    currentRoute = results[0];

    // Save to history
    if (session) {
      USER.addHistory(currentRoute.id, currentRoute.from, currentRoute.to);
    }

    resultArea.innerHTML = ROUTES.renderRoute(currentRoute);
    resultArea.classList.add('fade-in');

    const actionBar = document.getElementById('action-bar');
    actionBar.classList.remove('hidden');
    updateSaveBtn();

    // Load comments
    USER.renderComments(currentRoute.id, 'comments-wrap');
  }

  /* ------------------------------------------------------- SEARCH AGAIN --------------------------------------------------------------------------------------- */
  function searchAgain() {
    const from = document.getElementById('from-input').value.trim();
    const to   = document.getElementById('to-input').value.trim();
    if (!from || !to) { TOAST.show('Enter both From and Destination.', 'error'); return; }
    sessionStorage.setItem('wtg_search', JSON.stringify({ from, to }));
    loadResult();
  }

  /* ------------------------------------------------------- SAVE TOGGLE --------------------------------------------------------------------------------------- */
  async function toggleSave() {
    if (!session) { TOAST.show('Please log in to save routes.', 'error'); return; }
    if (!currentRoute) return;
    const saved = await USER.isRouteSaved(currentRoute.id);
    if (saved) {
      const ok = await USER.unsaveRoute(currentRoute.id);
      TOAST.show(ok ? 'Route removed from saved.' : 'Could not remove saved route.', ok ? '' : 'error');
    } else {
      const ok = await USER.saveRoute(currentRoute.id, currentRoute.from, currentRoute.to);
      TOAST.show(ok ? 'Route saved! 🔖' : 'Route is already saved.', ok ? 'success' : 'info');
    }
    await updateSaveBtn();
  }

  async function updateSaveBtn() {
    const btn = document.getElementById('save-btn');
    if (!btn || !currentRoute) return;
    const saved = await USER.isRouteSaved(currentRoute.id);
    btn.textContent = saved ? '✓ Saved' : '🔖 Save Route';
    btn.className   = saved ? 'btn btn-primary' : 'btn btn-secondary';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') searchAgain(); });

  loadResult();
</script>
</body>
</html>
