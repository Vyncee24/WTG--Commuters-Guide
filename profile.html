<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Routes — WTG</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="visuals/WTGLOGO.png" alt="" width="150"><span class="badge">Beta</span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Finder</a>
      <a href="profile.html" class="active">My Routes</a>
      <a href="#" id="nav-logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container page-wrap">

  <!-- Profile Header -->
  <div style="display:flex;align-items:center;gap:18px;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border);">
    <div id="user-avatar" style="width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;"></div>
    <div>
      <h2 id="user-name">Loading...</h2>
      <p id="user-email" class="text-sm text-muted"></p>
    </div>
    <div style="margin-left:auto;">
      <a href="index.html" class="btn btn-primary">Find Route</a>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('saved', this)">Saved Routes</button>
    <button class="tab-btn" onclick="switchTab('history', this)">Search History</button>
  </div>

  <!-- Saved Routes -->
  <div id="tab-saved">
    <div class="section-header">
      <h3>Saved Routes</h3>
    </div>
    <div id="saved-grid" class="saved-routes-grid"></div>
  </div>

  <!-- History -->
  <div id="tab-history" class="hidden">
    <div class="section-header">
      <h3>Recent Searches</h3>
      <button class="btn btn-sm btn-ghost" id="clear-history-btn" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

</div>

<div id="toast-container"></div>

<script src="auth.js"></script>
<script src="user.js"></script>
<script src="routes.js"></script>
<script>
  const session = AUTH.requireAuth('login.html');
  if (!session) throw new Error('not logged in');

  const _token = () => AUTH.getToken();
  const _authH = () => ({ 'Authorization': `Bearer ${_token()}`, 'Content-Type': 'application/json' });

  /* ── nav ── */
  document.getElementById('nav-logout').onclick = e => { e.preventDefault(); AUTH.logout(); };

  /* ── user header ── */
  const user = AUTH.getCurrentUser();
  document.getElementById('user-name').textContent  = user.name;
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();

  /* ── tab switch ── */
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-saved').classList.toggle('hidden', tab !== 'saved');
    document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
    if (tab === 'history') renderHistory();
  }

  /* ── saved routes ── */
  async function renderSaved() {
    const saved = await USER.getSavedRoutes();
    const grid  = document.getElementById('saved-grid');
    if (!saved || saved.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-icon"><img src="visuals/Sad.png" alt="" width="350px"></div>
          <h3>Oh no! No saved routes yet</h3>
          <p>Come and try saving routes with us</p>
          <a href="index.html" class="btn btn-primary mt-16">Find a Route</a>
        </div>`;
      return;
    }
    grid.innerHTML = saved.map(r => `
      <div class="route-card">
        <div class="route-card-from-to">
          <span class="route-loc">${escHtml(r.from_location)}</span>
          <span class="route-arrow">→</span>
          <span class="route-loc">${escHtml(r.to_location)}</span>
        </div>
        <div class="route-card-meta mt-8">Saved ${timeAgo(r.saved_at)}</div>
        <div style="display:flex;gap:8px;margin-top:14px;">
          <button class="btn btn-sm btn-primary flex-1"
            onclick="viewRoute('${escAttr(r.from_location)}','${escAttr(r.to_location)}')">View</button>
          <button class="btn btn-sm btn-ghost" onclick="unsave('${escAttr(r.route_id)}')">Remove</button>
        </div>
      </div>`).join('');
  }

  /* ── history: read from DB via API ── */
  async function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = `<div style="color:var(--text3);padding:20px 0;text-align:center;font-size:14px;">Loading…</div>`;

    try {
      const res = await fetch(`${API_URL}/history`, { headers: _authH() });

      if (!res.ok) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Could not load history</h3>
          <p class="text-sm">Server returned ${res.status}. Make sure the server is running.</p>
        </div>`;
        return;
      }

      const hist = await res.json();

      if (!hist.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🕓</div>
            <h3>No search history</h3>
            <p>Your recent route searches will appear here.</p>
          </div>`;
        return;
      }

      list.innerHTML = hist.map(h => `
        <div class="history-item" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
          <div style="flex:1;" onclick="viewRoute('${escAttr(h.origin)}','${escAttr(h.destination)}')">
            <div class="d-flex align-center gap-8">
              <span style="font-weight:500;">${escHtml(h.origin)}</span>
              <span class="text-muted">→</span>
              <span style="font-weight:500;">${escHtml(h.destination)}</span>
            </div>
            <div class="text-sm text-muted mt-8">${timeAgo(h.searched_at)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:12px;">
            <span style="color:var(--text3);font-size:13px;">→</span>
            <button
              class="btn btn-sm btn-ghost"
              style="padding:2px 8px;font-size:12px;line-height:1.4;"
              onclick="deleteEntry(${h.id}, this)"
              title="Remove this entry">✕</button>
          </div>
        </div>`).join('');

    } catch (err) {
      console.error('renderHistory error:', err);
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Could not load history</h3>
        <p class="text-sm">Network error. Is the server running?</p>
      </div>`;
    }
  }

  /* ── delete one entry ── */
  async function deleteEntry(id, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(`${API_URL}/history/${id}`, { method: 'DELETE', headers: _authH() });
      if (!res.ok) { TOAST.show('Could not remove entry.', 'error'); btn.disabled = false; return; }
      /* Remove just that row from the DOM without a full re-render */
      btn.closest('.history-item').remove();
      /* If list is now empty, show empty state */
      const list = document.getElementById('history-list');
      if (!list.querySelector('.history-item')) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🕓</div>
            <h3>No search history</h3>
            <p>Your recent route searches will appear here.</p>
          </div>`;
      }
      TOAST.show('Entry removed.');
    } catch {
      TOAST.show('Could not remove entry.', 'error');
      btn.disabled = false;
    }
  }

  /* ── clear all history ── */
  async function clearHistory() {
    const btn = document.getElementById('clear-history-btn');
    if (btn) btn.disabled = true;
    try {
      const res = await fetch(`${API_URL}/history`, { method: 'DELETE', headers: _authH() });
      if (!res.ok) { TOAST.show('Could not clear history.', 'error'); if (btn) btn.disabled = false; return; }
      TOAST.show('History cleared.');
      renderHistory();
    } catch {
      TOAST.show('Could not clear history.', 'error');
      if (btn) btn.disabled = false;
    }
  }

  /* ── helpers ── */
  function viewRoute(from, to) {
    sessionStorage.setItem('wtg_search', JSON.stringify({ from, to }));
    window.location.href = 'result.html';
  }

  async function unsave(routeId) {
    const ok = await USER.unsaveRoute(routeId);
    if (ok) { TOAST.show('Route removed.'); renderSaved(); }
    else { TOAST.show('Could not remove route.', 'error'); }
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(str) {
    return String(str ?? '').replace(/'/g, "\\'");
  }

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  renderSaved();
</script>
</body>
</html>
