<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WTG: Commuters Guide</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="visuals/WTGLOGO.png" alt="" width="150"><span class="badge">Beta</span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="active">Finder</a>
      <a href="profile.html">My Routes</a>
      <a href="login.html" id="nav-auth">Login</a>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-tag">Where To Go: Commuters Guide</div>
  <h1>Commute Effortless,<br/>Commute with Confidence</h1>
  <p>Input where do you want to go.</p>

  <!-- Search Box -->
  <div class="search-box">
    <div class="search-row">
      <div class="search-input-wrap">
        <input class="form-control" id="from-input" type="text" placeholder="From (e.g. CVSU CCAT)"
          list="location-list" autocomplete="off"/>
      </div>
      <div class="search-input-wrap">
        <input class="form-control" id="to-input" type="text" placeholder="Destination (e.g. SM Tanza)"
          list="location-list" autocomplete="off"/>
      </div>
    </div>
    <datalist id="location-list"></datalist>
    <button class="btn btn-primary btn-full btn-lg" onclick="findRoute()"> LET'S GO
    </button>
  </div>
</section>

<!-- Popular Routes -->
<section style="padding: 0 0 60px;">
  <div class="container">
    <div class="section-header">
      <h2>Popular Routes</h2>
    </div>
    <div class="saved-routes-grid" id="popular-grid">
      <!-- populated by JS below -->
    </div>
  </div>
</section>

<div id="toast-container"></div>

<script src="auth.js"></script>
<script src="user.js"></script>
<script src="routes.js"></script>
<script>
  /* ── Nav setup ── */
  const session = AUTH.getSession();
  if (session) {
    const authLink = document.getElementById('nav-auth');
    authLink.textContent = session.name.split(' ')[0];
    authLink.href = session.role === 'admin' ? 'admin.html' : 'profile.html';
    const logoutBtn = document.createElement('a');
    logoutBtn.href = '#';
    logoutBtn.textContent = 'Logout';
    logoutBtn.onclick = e => { e.preventDefault(); AUTH.logout(); };
    document.getElementById('nav-links').appendChild(logoutBtn);
  }

  /* ── Page init: load autocomplete + popular routes from MySQL API ── */
  async function initPage() {

    // --- Autocomplete: fetch location list from MySQL via API ---
    // CHANGED: was synchronous `ROUTES.getAllLocations()` (returned from
    // hard-coded ROUTE_DB).  Now awaits the API call to MySQL.
    try {
      const locs = await ROUTES.getAllLocations();
      const dl = document.getElementById('location-list');
      locs.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l;
        dl.appendChild(opt);
      });
    } catch (e) {
      console.warn('Could not load location autocomplete:', e);
    }

    // --- Popular routes: fetch from MySQL via API ---
    // CHANGED: was synchronous `ROUTES.getPopular()`.  Now awaited.
    const grid = document.getElementById('popular-grid');
    try {
      const popular = await ROUTES.getPopular();
      if (popular.length === 0) {
        grid.innerHTML = '<p style="color:var(--text3)">No popular routes yet.</p>';
      } else {
        grid.innerHTML = popular.map(r => `
          <div class="route-card" onclick="goTo('${r.from}','${r.to}')">
            <div class="route-card-from-to">
              <span class="route-loc">${r.from}</span>
              <span class="route-arrow">→</span>
              <span class="route-loc">${r.to}</span>
            </div>
            <div class="d-flex align-center gap-8 mt-8">
              ${(r.tags || []).map(t => `<span class="badge badge-gray">${t}</span>`).join('')}
              <span class="badge badge-blue">⏱ ${r.duration || ''}</span>
            </div>
            <div class="route-card-meta mt-8">${(r.steps || []).length} steps · ${r.fare || ''}</div>
          </div>
        `).join('');
      }
    } catch (e) {
      grid.innerHTML = '<p style="color:var(--text3)">Could not load popular routes.</p>';
      console.warn('Popular routes load error:', e);
    }
  }

  function goTo(from, to) {
    document.getElementById('from-input').value = from;
    document.getElementById('to-input').value = to;
    findRoute();
  }

  /* ── Route finder: saves params then goes to result.html ── */
  function findRoute() {
    const from = document.getElementById('from-input').value.trim();
    const to   = document.getElementById('to-input').value.trim();
    if (!from || !to) {
      TOAST.show('Please enter both From and Destination.', 'error');
      return;
    }
    sessionStorage.setItem('wtg_search', JSON.stringify({ from, to }));
    window.location.href = 'result.html';
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') findRoute(); });

  // Boot
  initPage();
</script>
</body>
</html>
